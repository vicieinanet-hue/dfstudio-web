<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060610">
    <title>DF Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg: #060610; --surface: #0E0E24; --surface2: #12172A;
            --orange: #FF6D00; --orangeDim: #BF4A00; --teal: #00BCD4;
            --tealDim: #008A9E; --warning: #FF1744; --green: #76FF03;
            --text: #EEE; --text2: #999; --border: #2A2A4A;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:var(--bg);color:var(--text);height:100vh;overflow:hidden;
            user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
            display:flex;flex-direction:column;
        }
        .topbar{
            display:flex;align-items:center;justify-content:space-between;
            padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);
        }
        .topbar .title{font-weight:900;color:var(--orange);font-size:14px;letter-spacing:1px}
        .topbar .stats{font-size:9px;color:var(--text2);font-family:monospace;display:flex;gap:6px}
        .topbar .stats span{color:var(--teal)}

        .player{
            background:var(--surface);padding:8px 12px;border-bottom:1px solid var(--border);
        }
        .player .info{display:flex;justify-content:space-between;align-items:center}
        .player .name{font-weight:700;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .player .badge{background:rgba(255,109,0,0.2);color:var(--orange);padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;margin-left:6px}
        .player .seek{margin:4px 0}
        .player .seek input{width:100%;height:4px;-webkit-appearance:none;background:#222;border-radius:2px;outline:none}
        .player .seek input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--teal);border-radius:50%}
        .player .time{display:flex;justify-content:space-between;font-size:9px;color:var(--text2);font-family:monospace}
        .player .ctrls{display:flex;justify-content:space-around;align-items:center;margin-top:6px}
        .player .ctrls button{background:none;border:1px solid #333;color:var(--text2);border-radius:50%;width:28px;height:28px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .player .play-btn{width:36px;height:36px;border:2px solid var(--teal)!important;color:var(--teal)!important;background:rgba(0,188,212,0.12)!important;font-size:16px!important}
        .player .marker-btn{border-color:var(--orange)!important;color:var(--orange)!important}

        .mixer{display:flex;flex:1;gap:3px;padding:3px}
        .channel{flex:1;background:var(--surface);border-radius:8px;display:flex;flex-direction:column;align-items:center;padding:5px 3px;border:2px solid #1A1A3A;gap:3px}
        .channel.voice{border-color:var(--orange)}
        .channel.play{border-color:var(--teal)}
        .channel.master{border-color:var(--orange)}
        .ch-name{font-size:8px;font-weight:900;letter-spacing:.5px;margin-bottom:1px}
        .voice .ch-name{color:var(--orange)}.play .ch-name{color:var(--teal)}.master .ch-name{color:var(--orange)}

        .knob-wrap{display:flex;flex-direction:column;align-items:center}
        .knob-wrap label{font-size:6px;color:var(--text2);margin-top:1px}
        .knob{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#1A1A3A;border:2px solid #333;cursor:pointer;outline:none}
        .knob::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:6px;background:var(--orange);border-radius:50%}

        .btn-row{display:flex;gap:2px;width:100%}
        .btn-row button{flex:1;padding:3px 1px;border-radius:3px;border:1px solid #333;background:var(--surface2);color:var(--text2);font-size:7px;font-weight:700;cursor:pointer}
        .btn-row .active{background:rgba(255,109,0,0.2);color:var(--orange);border-color:var(--orange)}

        .vu{width:80%;height:14px;background:#000;border-radius:2px;overflow:hidden;border:1px solid #1A1A3A}
        .vu .fill{height:0%;background:linear-gradient(to top,var(--green) 60%,#FFD600 80%,var(--warning) 100%);transition:height .08s}

        .fader-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
        .fader-wrap label{font-size:6px;color:var(--text2);margin-top:2px}
        .fader{-webkit-appearance:slider-vertical;width:16px;flex:1;min-height:50px;background:#1A1A3A;outline:none;border-radius:3px}
        .fader::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:14px;background:#555;border-radius:3px;border:1px solid #777}

        .nav-bar{display:flex;background:var(--surface);border-top:1px solid var(--border)}
        .nav-bar button{flex:1;padding:8px;background:none;border:none;color:var(--text2);font-size:8px;font-weight:700;cursor:pointer;border-top:2px solid transparent}
        .nav-bar .active{color:var(--orange);border-top-color:var(--orange)}

        .dialog{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100}
        .dlg{background:var(--surface);padding:20px;border-radius:12px;width:90%;max-width:320px;display:flex;flex-direction:column;gap:10px;border:1px solid var(--border)}
        .dlg h3{color:var(--orange);text-align:center;font-size:16px}
        .dlg input{padding:8px;border-radius:6px;border:1px solid #333;background:var(--bg);color:var(--text);font-size:14px}
        .dlg button{padding:10px;border-radius:6px;border:none;font-weight:700;cursor:pointer;font-size:13px}
        .dlg .btn-save{background:var(--orange);color:#FFF}
        .dlg .btn-cancel{background:#333;color:var(--text2)}
        .dlg .time-inputs{display:flex;gap:4px;align-items:center}
        .dlg .time-inputs input{width:48px;text-align:center}
        .dlg .time-inputs span{color:var(--text2);font-weight:700}

        .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
        .splash-logo{font-size:2em;font-weight:900;color:var(--orange)}
        .splash-sub{color:var(--text2);margin:8px 0 20px}
        .splash-loader{width:36px;height:36px;border:3px solid #222;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .splash button{padding:14px 44px;background:var(--orange);color:#FFF;border:none;border-radius:25px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px}
        .log{color:var(--text2);font-size:11px;margin-top:8px;text-align:center}
        .err{color:var(--warning);font-size:11px;margin-top:4px;text-align:center}
    </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="splash">
    <div class="splash-logo">🎤 DF STUDIO</div>
    <div class="splash-sub">Estúdio Profissional</div>
    <div class="splash-loader" id="splashLoader"></div>
    <div class="log" id="logMsg">A carregar motor de áudio...</div>
    <div class="err" id="errorMsg"></div>
    <button id="startBtn" style="display:none" onclick="initAudio()">COMEÇAR</button>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">

    <div class="topbar">
        <div class="title">DF STUDIO BETA</div>
        <div class="stats">
            <span id="sampleRate">48k</span> |
            <span id="bufferSize">128b</span> |
            LAT <span id="latency">0ms</span> |
            DSP <span id="cpuLoad">0%</span>
        </div>
        <button style="background:none;border:1px solid var(--teal);color:var(--teal);padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer">🎸 AFINADOR</button>
    </div>

    <div class="player">
        <div class="info">
            <div class="name" id="trackName">🎵 Nenhuma música carregada</div>
            <div class="badge" id="markerCount">0 marc</div>
        </div>
        <div class="seek"><input type="range" id="seekBar" min="0" max="1000" value="0"></div>
        <div class="time"><span id="currentTime">00:00</span><span id="durationTime">00:00</span></div>
        <div class="ctrls">
            <button onclick="prevTrack()">⏮</button>
            <button onclick="prevMarker()" class="marker-btn">⏪</button>
            <button id="playBtn" onclick="togglePlay()" class="play-btn">▶️</button>
            <button onclick="nextMarker()" class="marker-btn">⏩</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="showMarkerDialog()" class="marker-btn">📍</button>
            <button onclick="document.getElementById('fileInput').click()">📁</button>
            <input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="handleFileUpload(event)">
            <button onclick="stopTrack()">⏹</button>
        </div>
    </div>

    <div class="mixer">
        <div class="channel voice">
            <div class="ch-name">🎤 VOZ</div>
            <div class="knob-wrap"><label>GANHO</label><input type="range" id="micGain" class="knob" min="0" max="100" value="65"></div>
            <div class="btn-row"><button id="fxBtn" class="active" onclick="toggleFx()">FX</button><button id="atBtn" onclick="toggleAutotune()">AT</button></div>
            <div class="btn-row"><button onclick="setPan('voice',-1)">L</button><button class="active" onclick="setPan('voice',0)">C</button><button onclick="setPan('voice',1)">R</button></div>
            <div class="btn-row"><button id="voiceSolo" onclick="toggleSolo('voice')">S</button><button id="voiceMute" onclick="toggleMute('voice')">M</button></div>
            <div class="vu"><div class="fill" id="voiceVuFill"></div></div>
            <div class="fader-wrap"><input type="range" id="voiceFader" class="fader" min="0" max="100" value="50" orient="vertical"><label>FADER</label></div>
        </div>
        <div class="channel play">
            <div class="ch-name">🎵 PLAY</div>
            <div class="knob-wrap"><label>GANHO</label><input type="range" id="playGain" class="knob" min="0" max="100" value="40"></div>
            <div class="btn-row"><button id="playMonoBtn" onclick="togglePlayMono()">MONO</button></div>
            <div class="btn-row"><button onclick="setPan('play',-1)">L</button><button class="active" onclick="setPan('play',0)">C</button><button onclick="setPan('play',1)">R</button></div>
            <div class="btn-row"><button id="playSolo" onclick="toggleSolo('play')">S</button><button id="playMute" onclick="toggleMute('play')">M</button></div>
            <div class="vu"><div class="fill" id="playVuFill"></div></div>
            <div class="fader-wrap"><input type="range" id="playFader" class="fader" min="0" max="100" value="50" orient="vertical"><label>FADER</label></div>
        </div>
        <div class="channel master">
            <div class="ch-name">🔊 MASTER</div>
            <div class="knob-wrap"><label>MONITOR</label><input type="range" id="monGain" class="knob" min="0" max="100" value="50"></div>
            <div class="btn-row"><button id="monitorBtn" onclick="toggleMonitor()">MON SW</button></div>
            <div class="btn-row"><button onclick="setPan('master',-1)">L</button><button class="active" onclick="setPan('master',0)">C</button><button onclick="setPan('master',1)">R</button></div>
            <div class="btn-row"><button style="visibility:hidden">S</button><button id="masterMute" onclick="toggleMute('master')">M</button></div>
            <div class="vu"><div class="fill" id="masterVuFill"></div></div>
            <div class="fader-wrap"><input type="range" id="masterFader" class="fader" min="0" max="100" value="50" orient="vertical"><label>FADER</label></div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="active">🎛️ MIXER</button>
        <button>🎚️ EFEITOS</button>
        <button>🎤 ROBOT</button>
        <button>📚 BIB</button>
        <button>⚙️ CONFIG</button>
    </div>
</div>

<!-- MARKER DIALOG -->
<div class="dialog" id="markerDialog">
    <div class="dlg">
        <h3>📍 NOVO MARCADOR</h3>
        <input type="text" id="markerName" placeholder="Nome do marcador (ex: Refrão)">
        <label style="font-size:11px;color:var(--text2)"><input type="checkbox" id="useCurrentTime" checked onchange="toggleManualTime()"> Usar tempo atual</label>
        <div id="manualTime" style="display:none" class="time-inputs">
            <input type="number" id="markerMin" placeholder="MIN" min="0" max="99"> <span>:</span>
            <input type="number" id="markerSec" placeholder="SEG" min="0" max="59"> <span>.</span>
            <input type="number" id="markerMs" placeholder="MS" min="0" max="999">
        </div>
        <div id="previewTime" style="color:var(--orange);font-size:18px;font-weight:900;text-align:center;font-family:monospace"></div>
        <button class="btn-save" onclick="saveMarker()">💾 SALVAR</button>
        <button class="btn-cancel" onclick="closeMarkerDialog()">CANCELAR</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
