<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A0A1A">
    <title>DF Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .start-btn { padding: 15px 50px; background: #FF6D00; color: #FFF; border: none; border-radius: 30px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .error-msg { color: #FF1744; font-size: 12px; margin-top: 10px; text-align: center; max-width: 280px; }
        .log-msg { color: #888; font-size: 10px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>
    <div id="splash" class="splash">
        <div class="splash-logo">🎤 DF STUDIO</div>
        <div class="splash-sub">Estúdio Profissional</div>
        <div id="logMsg" class="log-msg"></div>
        <div id="errorMsg" class="error-msg"></div>
        <button id="startBtn" class="start-btn" style="display:none" onclick="initAudio()">COMEÇAR</button>
    </div>

    <div id="app" class="app" style="display:none">
        <header class="top-bar">
            <span style="font-weight:900;color:#FF6D00">DF STUDIO</span>
            <span id="latency" style="font-size:10px;color:#888">--</span>
        </header>
        <div class="player-bar">
            <div class="track-info"><span id="trackName">Nenhuma música</span><span id="markerCount">0</span></div>
            <div class="progress-bar"><input type="range" id="seekBar" min="0" max="1000" value="0" class="seek-slider"></div>
            <div class="time-display"><span id="currentTime">00:00</span><span id="durationTime">00:00</span></div>
            <div class="player-controls">
                <button onclick="prevMarker()" class="btn-icon" style="color:#FF6D00;border-color:#FF6D00">⏪</button>
                <button id="playBtn" onclick="togglePlay()" class="btn-play">▶️</button>
                <button onclick="nextMarker()" class="btn-icon" style="color:#FF6D00;border-color:#FF6D00">⏩</button>
                <button onclick="showMarkerDialog()" class="btn-icon">📍</button>
                <button class="btn-icon" onclick="document.getElementById('fileInput').click()">📁</button>
                <input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="handleFileUpload(event)">
                <button onclick="stopTrack()" class="btn-icon">⏹</button>
            </div>
        </div>

        <div class="mixer">
            <div class="channel voice-channel">
                <div class="channel-header">🎤 VOZ</div>
                <input type="range" id="micGain" class="knob" min="0" max="100" value="65" orient="vertical" style="-webkit-appearance:slider-vertical;width:30px;height:60px">
                <div style="display:flex;gap:3px;width:100%"><button id="fxBtn" class="btn-fx active">FX</button><button id="atBtn" class="btn-fx">AT</button></div>
                <div style="display:flex;gap:3px;width:100%"><button class="btn-pan active">C</button></div>
                <div style="display:flex;gap:3px;width:100%"><button class="btn-mute" onclick="toggleMute('voice')">M</button></div>
                <div class="vu-meter"><div class="vu-fill" id="voiceVuFill"></div></div>
                <input type="range" id="voiceFader" class="fader" min="0" max="100" value="50" orient="vertical" style="-webkit-appearance:slider-vertical;width:20px;flex:1;min-height:60px">
            </div>
            <div class="channel play-channel">
                <div class="channel-header">🎵 PLAY</div>
                <input type="range" id="playGain" class="knob" min="0" max="100" value="40" orient="vertical" style="-webkit-appearance:slider-vertical;width:30px;height:60px">
                <button id="playMonoBtn" class="btn-mono" onclick="togglePlayMono()" style="width:100%">MONO</button>
                <div style="display:flex;gap:3px;width:100%"><button class="btn-pan active">C</button></div>
                <div style="display:flex;gap:3px;width:100%"><button class="btn-mute" onclick="toggleMute('play')">M</button></div>
                <div class="vu-meter"><div class="vu-fill" id="playVuFill"></div></div>
                <input type="range" id="playFader" class="fader" min="0" max="100" value="50" orient="vertical" style="-webkit-appearance:slider-vertical;width:20px;flex:1;min-height:60px">
            </div>
            <div class="channel master-channel">
                <div class="channel-header">🔊 MASTER</div>
                <button id="monitorBtn" class="btn-monitor" onclick="toggleMonitor()" style="width:100%">MON</button>
                <div style="display:flex;gap:3px;width:100%"><button class="btn-pan active">C</button></div>
                <div style="display:flex;gap:3px;width:100%"><button class="btn-mute" onclick="toggleMute('master')">M</button></div>
                <div class="vu-meter"><div class="vu-fill" id="masterVuFill"></div></div>
                <input type="range" id="masterFader" class="fader" min="0" max="100" value="50" orient="vertical" style="-webkit-appearance:slider-vertical;width:20px;flex:1;min-height:60px">
            </div>
        </div>
    </div>

    <div id="markerDialog" class="dialog" style="display:none">
        <div class="dialog-content">
            <h3>Novo Marcador</h3>
            <input type="text" id="markerName" placeholder="Nome do marcador">
            <label><input type="checkbox" id="useCurrentTime" checked onchange="toggleManualTime()"> Usar tempo atual</label>
            <div id="manualTime" style="display:none">
                <input type="number" id="markerMin" placeholder="MIN" min="0" max="99" style="width:50px"> :
                <input type="number" id="markerSec" placeholder="SEG" min="0" max="59" style="width:50px"> .
                <input type="number" id="markerMs" placeholder="MS" min="0" max="999" style="width:60px">
            </div>
            <button onclick="saveMarker()">SALVAR</button>
            <button onclick="closeMarkerDialog()">CANCELAR</button>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════
    // AUDIO ENGINE (inline)
    // ═══════════════════════════════════════════════
    var engine = {
        audioCtx: null, sampleRate: 48000,
        micGain: 0.65, playGain: 0.40, masterGain: 0.50,
        isMicMuted: true, isPlayMuted: true, isMasterMuted: true,
        isPlayMono: false,
        audioBuffer: null, sourceNode: null, isPlaying: false,
        playbackPosition: 0, markers: [], sourceStartTime: 0,
        micGainNode: null, playGainNode: null, masterGainNode: null,
        analyser: null, vuData: new Uint8Array(128),

        init: async function() {
            try {
                logMsg('Criando AudioContext...');
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: this.sampleRate, latencyHint: 'interactive' });
                this.sampleRate = this.audioCtx.sampleRate;
                logMsg('SampleRate: ' + this.sampleRate);
                
                this.micGainNode = this.audioCtx.createGain(); this.micGainNode.gain.value = 0;
                this.playGainNode = this.audioCtx.createGain(); this.playGainNode.gain.value = 0;
                this.masterGainNode = this.audioCtx.createGain(); this.masterGainNode.gain.value = 0;
                this.analyser = this.audioCtx.createAnalyser(); this.analyser.fftSize = 256;
                
                this.micGainNode.connect(this.analyser);
                this.analyser.connect(this.masterGainNode);
                this.playGainNode.connect(this.masterGainNode);
                this.masterGainNode.connect(this.audioCtx.destination);
                
                logMsg('Tentando microfone...');
                try {
                    var stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
                    var inputNode = this.audioCtx.createMediaStreamSource(stream);
                    inputNode.connect(this.micGainNode);
                    logMsg('Microfone OK!');
                } catch(micErr) {
                    logMsg('Microfone indisponivel: ' + micErr.message);
                }
                
                logMsg('AudioEngine PRONTO!');
                return true;
            } catch(e) {
                logMsg('ERRO: ' + e.message);
                return false;
            }
        },

        setMicGain: function(v) { this.micGain = v; if(this.micGainNode) this.micGainNode.gain.value = this.isMicMuted ? 0 : v * 4; },
        setPlayGain: function(v) { this.playGain = v; if(this.playGainNode) this.playGainNode.gain.value = this.isPlayMuted ? 0 : v; },
        setMasterGain: function(v) { this.masterGain = v; if(this.masterGainNode) this.masterGainNode.gain.value = this.isMasterMuted ? 0 : v; },

        toggleMute: function(ch) {
            if(ch==='voice'){ this.isMicMuted=!this.isMicMuted; this.setMicGain(this.micGain); }
            else if(ch==='play'){ this.isPlayMuted=!this.isPlayMuted; this.setPlayGain(this.playGain); }
            else if(ch==='master'){ this.isMasterMuted=!this.isMasterMuted; this.setMasterGain(this.masterGain); }
        },

        togglePlayMono: function(){ this.isPlayMono = !this.isPlayMono; },
        
        getVu: function(){ 
            if(this.analyser){ 
                this.analyser.getByteTimeDomainData(this.vuData); 
                var s=0; 
                for(var i=0;i<this.vuData.length;i++) s+=Math.abs(this.vuData[i]-128); 
                return s/this.vuData.length/128; 
            } 
            return 0; 
        },

        togglePlay: function(){
            if(this.isPlaying){ try{this.sourceNode.stop();}catch(e){} this.isPlaying=false; }
            else if(this.audioBuffer){ this.playFromPosition(this.playbackPosition); }
        },

        playFromPosition: function(pos){
            if(!this.audioBuffer||!this.audioCtx) return;
            try{this.sourceNode.stop();}catch(e){}
            this.sourceNode = this.audioCtx.createBufferSource();
            this.sourceNode.buffer = this.audioBuffer;
            this.sourceNode.connect(this.playGainNode);
            this.sourceNode.start(0, pos||0);
            this.isPlaying = true; this.playbackPosition = pos||0;
            this.sourceStartTime = this.audioCtx.currentTime - (pos||0);
        },

        loadAudioFile: async function(file){
            try{ var b=await file.arrayBuffer(); this.audioBuffer=await this.audioCtx.decodeAudioData(b); return true; }
            catch(e){ logMsg('Erro audio: '+e.message); return false; }
        },

        getCurrentTime: function(){ return this.audioCtx?this.audioCtx.currentTime:0; },
        getDuration: function(){ return this.audioBuffer?this.audioBuffer.duration:0; }
    };

    // ═══════════════════════════════════════════════
    // APP LOGIC
    // ═══════════════════════════════════════════════
    function logMsg(msg) {
        console.log(msg);
        var el = document.getElementById('logMsg');
        if(el) el.textContent = msg;
    }

    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
        document.getElementById('startBtn').style.display = 'block';
    }

    async function initAudio() {
        try {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('errorMsg').textContent = '';
            logMsg('Iniciando...');
            
            var ok = await engine.init();
            if (ok) {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                engine.toggleMute('master');
                engine.setMasterGain(0.5);
                setInterval(updateUI, 100);
            } else {
                showError('Falha ao iniciar áudio. Toque para tentar novamente.');
            }
        } catch(err) {
            showError('Erro: ' + err.message);
        }
    }

    function updateUI() {
        if(!engine.audioCtx) return;
        try {
            document.getElementById('latency').textContent = Math.round(engine.audioCtx.baseLatency * 1000) + 'ms';
            var vu = engine.getVu();
            var fills = document.querySelectorAll('.vu-fill');
            for(var i=0;i<fills.length;i++) fills[i].style.height = (vu*100)+'%';
            if(engine.isPlaying && engine.audioBuffer) {
                var ct = engine.audioCtx.currentTime - engine.sourceStartTime;
                document.getElementById('currentTime').textContent = formatTime(ct);
                document.getElementById('seekBar').value = (ct/engine.audioBuffer.duration)*1000||0;
            }
        } catch(e) {}
    }

    function formatTime(s) { 
        var m=Math.floor(s/60), sec=Math.floor(s%60); 
        return m.toString().padStart(2,'0')+':'+sec.toString().padStart(2,'0'); 
    }

    // Event Listeners
    document.getElementById('startBtn').addEventListener('click', initAudio);
    document.getElementById('micGain').addEventListener('input', function(e){ engine.setMicGain(e.target.value/100); });
    document.getElementById('playGain').addEventListener('input', function(e){ engine.setPlayGain(e.target.value/100); });
    document.getElementById('masterFader').addEventListener('input', function(e){ engine.setMasterGain(e.target.value/100); });
    document.getElementById('voiceFader').addEventListener('input', function(e){ engine.setMicGain(e.target.value/100); });
    document.getElementById('seekBar').addEventListener('input', function(e){ if(engine.audioBuffer) engine.playFromPosition((e.target.value/1000)*engine.audioBuffer.duration); });

    function togglePlay() { engine.togglePlay(); document.getElementById('playBtn').textContent = engine.isPlaying?'⏸️':'▶️'; }
    function stopTrack() { try{engine.sourceNode.stop();}catch(e){} engine.isPlaying=false; engine.playbackPosition=0; document.getElementById('playBtn').textContent='▶️'; }
    function toggleMute(ch) { engine.toggleMute(ch); }
    function togglePlayMono() { engine.togglePlayMono(); document.getElementById('playMonoBtn').classList.toggle('active'); }
    function toggleMonitor() { document.getElementById('monitorBtn').classList.toggle('active'); }
    function toggleFx() { document.getElementById('fxBtn').classList.toggle('active'); }
    function toggleAutotune() { document.getElementById('atBtn').classList.toggle('active'); }

    function showMarkerDialog() { document.getElementById('markerDialog').style.display='flex'; }
    function closeMarkerDialog() { document.getElementById('markerDialog').style.display='none'; }
    function toggleManualTime() { document.getElementById('manualTime').style.display = document.getElementById('useCurrentTime').checked?'none':'block'; }

    function saveMarker() {
        var name = document.getElementById('markerName').value || 'Marcador';
        var timeUs;
        if(document.getElementById('useCurrentTime').checked) { timeUs = engine.getCurrentTime()*1000000; }
        else { var min=parseInt(document.getElementById('markerMin').value)||0; var sec=parseInt(document.getElementById('markerSec').value)||0; var ms=parseInt(document.getElementById('markerMs').value)||0; timeUs = (min*60+sec)*1000000 + ms*1000; }
        engine.markers.push({name:name, timeUs:timeUs});
        document.getElementById('markerCount').textContent = engine.markers.length;
        closeMarkerDialog();
    }

    function prevMarker() {
        if(!engine.markers.length) return;
        var cur = engine.getCurrentTime()*1000000;
        var sorted = engine.markers.slice().sort(function(a,b){return a.timeUs-b.timeUs;});
        var prev = sorted.filter(function(m){return m.timeUs < cur-500000;}).pop() || sorted[sorted.length-1];
        if(prev) engine.playFromPosition(prev.timeUs/1000000);
    }

    function nextMarker() {
        if(!engine.markers.length) return;
        var cur = engine.getCurrentTime()*1000000;
        var sorted = engine.markers.slice().sort(function(a,b){return a.timeUs-b.timeUs;});
        var next = sorted.find(function(m){return m.timeUs > cur+500000;}) || sorted[0];
        if(next) engine.playFromPosition(next.timeUs/1000000);
    }

    async function handleFileUpload(event) {
        var file = event.target.files[0];
        if(file) {
            var ok = await engine.loadAudioFile(file);
            if(ok) { document.getElementById('trackName').textContent = file.name.replace(/\.[^/.]+$/,''); document.getElementById('durationTime').textContent = formatTime(engine.getDuration()); }
        }
    }

    // Auto start
    window.addEventListener('load', function() {
        logMsg('Página carregada. Iniciando em 1s...');
        setTimeout(function() {
            initAudio().catch(function() {
                showError('Toque no botão para iniciar e permita o microfone');
            });
        }, 1000);
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
    </script>
</body>
</html>
