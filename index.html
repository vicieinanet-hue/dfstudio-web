<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060610">
    <title>DF Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        :root {
            --bg: #060610; --surface: #0E0E24; --surfaceHigh: #12172A;
            --orange: #FF6D00; --teal: #00BCD4; --warning: #FF1744;
            --text: #EEE; --textSecondary: #999; --textDisabled: #555;
            --border: #2A2A4A;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            width: 100vw; height: 100vh; height: 100dvh;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column;
            max-width: 430px; margin: 0 auto;
        }
        .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
        .splash h1{font-size:1.8em;font-weight:900;color:var(--orange)}
        .splash p{color:var(--textSecondary);margin:6px 0 20px}
        .splash .loader{width:32px;height:32px;border:3px solid #222;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .splash button{padding:14px 40px;background:var(--orange);color:#FFF;border:none;border-radius:24px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;display:none}
        .splash .msg{color:var(--textSecondary);font-size:11px;margin-top:8px}
        .splash .err{color:var(--warning);font-size:11px;margin-top:4px}

        .app{display:none;flex-direction:column;height:100%;width:100%}

        /* TOP BAR */
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--surface);border-bottom:1px solid var(--border);min-height:32px;gap:4px;flex-shrink:0}
        .topbar .devices{display:flex;gap:3px;flex:1}
        .topbar .devices select{flex:1;background:var(--surfaceHigh);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 4px;font-size:9px;max-width:48%}
        .topbar .stats{font-size:7px;color:var(--textSecondary);font-family:monospace;display:flex;gap:4px;white-space:nowrap}
        .topbar .stats span{color:var(--teal)}

        /* PLAYER */
        .player{background:var(--surface);padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
        .player .info{display:flex;justify-content:space-between;align-items:center}
        .player .name{font-weight:700;font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
        .player .badge{background:rgba(255,109,0,0.15);color:var(--orange);padding:1px 5px;border-radius:6px;font-size:8px;font-weight:700;margin-left:4px;white-space:nowrap}
        .player input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:#222;border-radius:2px;outline:none;margin:2px 0}
        .player input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--teal);border-radius:50%}
        .player .time{display:flex;justify-content:space-between;font-size:8px;color:var(--textSecondary);font-family:monospace}
        .player .ctrls{display:flex;justify-content:space-evenly;align-items:center;margin-top:3px;gap:1px}
        .player .ctrls button{background:none;border:1px solid #333;color:var(--textSecondary);border-radius:50%;width:26px;height:26px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
        .player .ctrls .play-btn{width:32px;height:32px;border:2px solid var(--teal);color:var(--teal);background:rgba(0,188,212,0.12);font-size:14px}
        .player .ctrls .marker-btn{border-color:var(--orange);color:var(--orange)}

        /* SCROLL CONTAINER */
        .scroll-container{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:3px}

        /* CHANNEL STRIP - VERTICAL LAYOUT */
        .channel-strip{display:flex;align-items:stretch;background:var(--surface);border-radius:8px;border:2px solid #1A1A3A;margin-bottom:3px;padding:5px;gap:4px;min-height:100px}
        .channel-strip.voice{border-color:var(--orange)}
        .channel-strip.play{border-color:var(--teal)}
        .channel-strip.master{border-color:var(--orange)}
        
        .ch-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:40px;flex-shrink:0}
        .ch-left .ch-icon{font-size:16px}
        .ch-left .ch-name{font-size:7px;font-weight:900;letter-spacing:.5px;text-align:center}
        .voice .ch-left .ch-name{color:var(--orange)}.play .ch-left .ch-name{color:var(--teal)}.master .ch-left .ch-name{color:var(--orange)}
        
        .ch-knobs{display:flex;flex-direction:column;align-items:center;gap:2px;width:45px;flex-shrink:0}
        .ch-knobs label{font-size:6px;color:var(--textSecondary)}
        .knob{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#1A1A3A;border:2px solid #333;cursor:pointer;outline:none}
        
        .ch-center{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
        .btn-row{display:flex;gap:1px;width:100%}
        .btn-row button{flex:1;padding:4px 0;border-radius:3px;border:1px solid #333;background:var(--surfaceHigh);color:var(--textSecondary);font-size:7px;font-weight:700;cursor:pointer}
        .btn-row .active{background:rgba(255,109,0,0.2);color:var(--orange);border-color:var(--orange)}
        .btn-row .solo-active{background:rgba(118,255,3,0.15);color:#76FF03;border-color:#76FF03}
        .btn-row .mute-active{background:rgba(255,23,68,0.2);color:var(--warning);border-color:var(--warning)}
        .vu-row{display:flex;gap:3px;width:100%}
        .vu{flex:1;height:10px;background:#000;border-radius:1px;overflow:hidden;border:1px solid #1A1A3A}
        .vu .fill{height:0%;background:linear-gradient(to top,#76FF03 60%,#FFD600 80%,var(--warning) 100%);transition:height .06s}
        
        .ch-right{display:flex;align-items:stretch;gap:3px;width:50px;flex-shrink:0}
        .fader-col{display:flex;flex-direction:column;align-items:center;flex:1}
        .fader-col label{font-size:5px;color:var(--textSecondary);margin-top:2px}
        .fader{-webkit-appearance:slider-vertical;width:16px;flex:1;min-height:60px;background:#1A1A3A;outline:none;border-radius:3px}
        .fader::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:12px;background:#555;border-radius:2px;border:1px solid #777}
        .fader-scale{display:flex;flex-direction:column;justify-content:space-between;padding:2px 0}
        .fader-scale span{font-size:5px;color:var(--textSecondary);font-family:monospace;line-height:1}

        .nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
        .nav button{flex:1;padding:6px 0;background:none;border:none;color:var(--textSecondary);font-size:7px;font-weight:700;cursor:pointer;border-top:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
        .nav button span{font-size:14px}
        .nav .active{color:var(--orange);border-top-color:var(--orange)}

        .dlg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100}
        .dlg>div{background:var(--surface);padding:16px;border-radius:10px;width:90%;max-width:320px;display:flex;flex-direction:column;gap:8px;border:1px solid var(--border)}
        .dlg h3{color:var(--orange);text-align:center;font-size:15px}
        .dlg input{padding:8px;border-radius:5px;border:1px solid #333;background:var(--bg);color:var(--text);font-size:14px}
        .dlg button{padding:8px;border-radius:5px;border:none;font-weight:700;cursor:pointer;font-size:12px}
        .dlg .save{background:var(--orange);color:#FFF}
        .dlg .cancel{background:#333;color:var(--textSecondary)}
        .dlg .time-row{display:flex;gap:3px;align-items:center;justify-content:center}
        .dlg .time-row input{width:45px;text-align:center;font-size:14px}
        .dlg .time-row span{color:var(--textSecondary);font-weight:700}
    </style>
</head>
<body>

<div id="splash" class="splash">
    <h1>🎤 DF STUDIO</h1><p>Estúdio Profissional</p>
    <div class="loader"></div><div class="msg" id="msg">A iniciar...</div><div class="err" id="err"></div>
    <button id="startBtn" onclick="start()">COMEÇAR</button>
</div>

<div id="app" class="app">
    <div class="topbar">
        <div class="devices">
            <select><option>🎤 Microfone</option></select>
            <select><option>🔊 Saída</option></select>
        </div>
        <div class="stats"><span id="sr">48k</span>|<span id="buf">128b</span>|LAT <span id="lat">0ms</span>|DSP <span id="dsp">0%</span></div>
    </div>

    <div class="player">
        <div class="info"><div class="name" id="trackName">🎵 Nenhuma música</div><div class="badge" id="markerBadge">0</div></div>
        <input type="range" id="seekBar" min="0" max="1000" value="0">
        <div class="time"><span id="curTime">00:00</span><span id="durTime">00:00</span></div>
        <div class="ctrls">
            <button onclick="prevMarker()" class="marker-btn">⏪</button>
            <button id="playBtn" onclick="togglePlay()" class="play-btn">▶️</button>
            <button onclick="nextMarker()" class="marker-btn">⏩</button>
            <button onclick="showMarkerDlg()">📍</button>
            <button onclick="document.getElementById('fileInput').click()">📁</button>
            <input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="loadFile(event)">
            <button onclick="stopTrack()">⏹</button>
        </div>
    </div>

    <div class="scroll-container">

        <!-- VOZ -->
        <div class="channel-strip voice">
            <div class="ch-left"><div class="ch-icon">🎤</div><div class="ch-name">VOZ</div></div>
            <div class="ch-knobs"><label>GANHO</label><input type="range" id="micGain" class="knob" min="0" max="100" value="65"></div>
            <div class="ch-center">
                <div class="btn-row"><button id="fxOn" class="active" onclick="toggleFx()">FX</button><button id="atOn" onclick="toggleAt()">AT</button></div>
                <div class="btn-row"><button onclick="setPan('voice',-1)">L</button><button class="active" onclick="setPan('voice',0)">C</button><button onclick="setPan('voice',1)">R</button></div>
                <div class="btn-row"><button id="voiceSolo" onclick="toggleSolo('voice')">S</button><button id="voiceMute" class="mute-active" onclick="toggleMute('voice')">M</button></div>
                <div class="vu"><div class="fill" id="voiceVu"></div></div>
            </div>
            <div class="ch-right">
                <div class="fader-col"><input type="range" id="voiceFader" class="fader" min="0" max="100" value="50" orient="vertical"><label>FADER</label></div>
                <div class="fader-scale"><span>+12</span><span>+6</span><span>0</span><span>-12</span><span>-30</span><span>-∞</span></div>
            </div>
        </div>

        <!-- PLAY -->
        <div class="channel-strip play">
            <div class="ch-left"><div class="ch-icon">🎵</div><div class="ch-name">PLAY</div></div>
            <div class="ch-knobs"><label>GANHO</label><input type="range" id="playGain" class="knob" min="0" max="100" value="40"></div>
            <div class="ch-center">
                <div class="btn-row"><button id="monoOn" onclick="toggleMono()">MONO</button></div>
                <div class="btn-row"><button onclick="setPan('play',-1)">L</button><button class="active" onclick="setPan('play',0)">C</button><button onclick="setPan('play',1)">R</button></div>
                <div class="btn-row"><button id="playSolo" onclick="toggleSolo('play')">S</button><button id="playMute" class="mute-active" onclick="toggleMute('play')">M</button></div>
                <div class="vu"><div class="fill" id="playVu"></div></div>
            </div>
            <div class="ch-right">
                <div class="fader-col"><input type="range" id="playFader" class="fader" min="0" max="100" value="50" orient="vertical"><label>FADER</label></div>
                <div class="fader-scale"><span>+12</span><span>+6</span><span>0</span><span>-12</span><span>-30</span><span>-∞</span></div>
            </div>
        </div>

        <!-- MASTER -->
        <div class="channel-strip master">
            <div class="ch-left"><div class="ch-icon">🔊</div><div class="ch-name">MASTER</div></div>
            <div class="ch-knobs"><label>MONITOR</label><input type="range" id="monGain" class="knob" min="0" max="100" value="50"></div>
            <div class="ch-center">
                <div class="btn-row"><button id="monSw" onclick="toggleMon()">MON SW</button></div>
                <div style="font-size:6px;color:var(--textSecondary);text-align:center" id="monLabel">DIRECT MON</div>
                <div class="btn-row"><button onclick="setPan('master',-1)">L</button><button class="active" onclick="setPan('master',0)">C</button><button onclick="setPan('master',1)">R</button></div>
                <div class="btn-row"><button style="visibility:hidden">S</button><button id="masterMute" onclick="toggleMute('master')">M</button></div>
                <div class="vu-row"><div class="vu"><div class="fill" id="masterVuL"></div></div><div class="vu"><div class="fill" id="masterVuR"></div></div></div>
            </div>
            <div class="ch-right">
                <div class="fader-col"><input type="range" id="masterFader" class="fader" min="0" max="100" value="50" orient="vertical"><label>FADER</label></div>
                <div class="fader-scale"><span>+12</span><span>+6</span><span>0</span><span>-12</span><span>-30</span><span>-∞</span></div>
            </div>
        </div>

    </div>

    <div class="nav">
        <button class="active"><span>🎛️</span>MIXER</button>
        <button><span>🎚️</span>EFEITOS</button>
        <button><span>🎤</span>ROBOT</button>
        <button><span>📚</span>BIB</button>
        <button><span>⚙️</span>CONFIG</button>
    </div>
</div>

<div class="dlg" id="markerDlg">
    <div>
        <h3>📍 NOVO MARCADOR</h3>
        <input type="text" id="markerName" placeholder="Nome do marcador">
        <label style="font-size:10px;color:var(--textSecondary)"><input type="checkbox" id="useCurTime" checked onchange="toggleManTime()"> Usar tempo atual</label>
        <div id="manTime" style="display:none" class="time-row">
            <input type="number" id="mm" placeholder="MIN" min="0" max="99"><span>:</span>
            <input type="number" id="ss" placeholder="SEG" min="0" max="59"><span>.</span>
            <input type="number" id="ms" placeholder="MS" min="0" max="999">
        </div>
        <button class="save" onclick="saveMarker()">💾 SALVAR</button>
        <button class="cancel" onclick="closeMarkerDlg()">CANCELAR</button>
    </div>
</div>

<script>
var ctx,micG,playG,masterG,monG,aMic,aPlay,aMasterL,aMasterR,audioBuf,srcNode,playing=false,pos=0,startTime=0,markers=[];
var micGain=.65,playGain=.40,masterGain=.50,monGain=.50;
var micMuted=true,playMuted=true,masterMuted=true,micSolo=false,playSolo=false,playMono=false,monOn=false;
var vuData=new Uint8Array(128);

function log(m){var e=document.getElementById('msg');if(e)e.textContent=m;}
function err(m){var e=document.getElementById('err');if(e)e.textContent=m;document.getElementById('startBtn').style.display='block';}

async function start(){
    try{
        document.getElementById('startBtn').style.display='none';document.getElementById('err').textContent='';
        ctx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
        micG=ctx.createGain();micG.gain.value=0;playG=ctx.createGain();playG.gain.value=0;
        masterG=ctx.createGain();masterG.gain.value=0;monG=ctx.createGain();monG.gain.value=0;
        aMic=ctx.createAnalyser();aMic.fftSize=256;aPlay=ctx.createAnalyser();aPlay.fftSize=256;
        aMasterL=ctx.createAnalyser();aMasterL.fftSize=256;aMasterR=ctx.createAnalyser();aMasterR.fftSize=256;
        micG.connect(aMic);aMic.connect(monG);monG.connect(masterG);
        playG.connect(aPlay);aPlay.connect(masterG);
        masterG.connect(aMasterL);masterG.connect(aMasterR);
        aMasterL.connect(ctx.destination);aMasterR.connect(ctx.destination);
        try{var s=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});ctx.createMediaStreamSource(s).connect(micG);}catch(e){}
        document.getElementById('sr').textContent=(ctx.sampleRate/1000).toFixed(1)+'k';
        masterMuted=false;masterG.gain.value=masterGain;document.getElementById('masterMute').classList.remove('mute-active');
        document.getElementById('splash').style.display='none';document.getElementById('app').style.display='flex';
        loadMarkers();setInterval(loop,80);
    }catch(e){err('Toque para tentar');}
}

function loop(){
    if(!ctx)return;
    try{
        document.getElementById('lat').textContent=Math.round(ctx.baseLatency*1000)+'ms';
        document.getElementById('voiceVu').style.height=(vu(aMic)*100)+'%';
        document.getElementById('playVu').style.height=(vu(aPlay)*100)+'%';
        document.getElementById('masterVuL').style.height=(vu(aMasterL)*100)+'%';
        document.getElementById('masterVuR').style.height=(vu(aMasterR)*100)+'%';
        if(playing&&audioBuf){var t=ctx.currentTime-startTime;document.getElementById('curTime').textContent=fm(t);document.getElementById('seekBar').value=(t/audioBuf.duration)*1000||0;}
    }catch(e){}
}
function vu(a){if(!a)return 0;a.getByteTimeDomainData(vuData);var s=0;for(var i=0;i<vuData.length;i++)s+=Math.abs(vuData[i]-128);return Math.min(1,s/vuData.length/128*1.5);}
function fm(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return m.toString().padStart(2,'0')+':'+sec.toString().padStart(2,'0');}

function setMic(v){micGain=v;if(micG)micG.gain.value=micMuted?0:v*4;}
function setPlay(v){playGain=v;if(playG)playG.gain.value=playMuted?0:v;}
function setMaster(v){masterGain=v;if(masterG)masterG.gain.value=masterMuted?0:v;}
function setMon(v){monGain=v;if(monG)monG.gain.value=monOn?v:0;}

function toggleMute(ch){
    if(ch==='voice'){micMuted=!micMuted;setMic(micGain);var b=document.getElementById('voiceMute');if(b){if(micMuted)b.classList.add('mute-active');else b.classList.remove('mute-active');}}
    else if(ch==='play'){playMuted=!playMuted;setPlay(playGain);var b=document.getElementById('playMute');if(b){if(playMuted)b.classList.add('mute-active');else b.classList.remove('mute-active');}}
    else{masterMuted=!masterMuted;setMaster(masterGain);var b=document.getElementById('masterMute');if(b){if(masterMuted)b.classList.add('mute-active');else b.classList.remove('mute-active');}}
}
function toggleSolo(ch){if(ch==='voice')micSolo=!micSolo;else playSolo=!playSolo;var b=document.getElementById(ch==='voice'?'voiceSolo':'playSolo');if(b){var a=ch==='voice'?micSolo:playSolo;if(a)b.classList.add('solo-active');else b.classList.remove('solo-active');}}
function toggleMono(){playMono=!playMono;var b=document.getElementById('monoOn');if(b){if(playMono)b.classList.add('active');else b.classList.remove('active');}}
function toggleMon(){monOn=!monOn;setMon(monGain);var b=document.getElementById('monSw');if(b){if(monOn)b.classList.add('active');else b.classList.remove('active');}document.getElementById('monLabel').textContent=monOn?'RETORNO APP':'DIRECT MON';}
function toggleFx(){document.getElementById('fxOn').classList.toggle('active');}
function toggleAt(){document.getElementById('atOn').classList.toggle('active');}
function setPan(ch,v){var p=document.querySelector('.'+ch+' .btn-row:nth-of-type(2)');if(!p)return;var btns=p.querySelectorAll('button');btns.forEach(function(b,i){b.classList.remove('active');if((v===-1&&i===0)||(v===0&&i===1)||(v===1&&i===2))b.classList.add('active');});}

function togglePlay(){if(playing){try{srcNode.stop();}catch(e){}playing=false;}else if(audioBuf){playFrom(pos);}document.getElementById('playBtn').textContent=playing?'⏸️':'▶️';}
function stopTrack(){try{srcNode.stop();}catch(e){}playing=false;pos=0;document.getElementById('playBtn').textContent='▶️';}
function playFrom(p){if(!audioBuf||!ctx)return;try{srcNode.stop();}catch(e){}srcNode=ctx.createBufferSource();srcNode.buffer=audioBuf;srcNode.connect(playG);srcNode.start(0,p||0);playing=true;pos=p||0;startTime=ctx.currentTime-(p||0);document.getElementById('playBtn').textContent='⏸️';}
async function loadFile(e){var f=e.target.files[0];if(f){try{var b=await f.arrayBuffer();audioBuf=await ctx.decodeAudioData(b);document.getElementById('trackName').textContent='🎵 '+f.name.replace(/\.[^/.]+$/,'');document.getElementById('durTime').textContent=fm(audioBuf.duration);}catch(ex){}}}

function loadMarkers(){try{var s=localStorage.getItem('df_markers');if(s)markers=JSON.parse(s);updMarkerBadge();}catch(e){}}
function saveMarkers(){try{localStorage.setItem('df_markers',JSON.stringify(markers));}catch(e){}}
function updMarkerBadge(){document.getElementById('markerBadge').textContent=markers.length;}
function showMarkerDlg(){document.getElementById('markerDlg').style.display='flex';}
function closeMarkerDlg(){document.getElementById('markerDlg').style.display='none';}
function toggleManTime(){document.getElementById('manTime').style.display=document.getElementById('useCurTime').checked?'none':'flex';}
function saveMarker(){
    var n=document.getElementById('markerName').value||'Marcador';var tu;
    if(document.getElementById('useCurTime').checked){tu=(ctx.currentTime-startTime)*1000000;}
    else{var min=parseInt(document.getElementById('mm').value)||0;var sec=parseInt(document.getElementById('ss').value)||0;var ms=parseInt(document.getElementById('ms').value)||0;tu=(min*60+sec)*1000000+ms*1000;}
    markers.push({name:n,timeUs:tu});markers.sort(function(a,b){return a.timeUs-b.timeUs;});saveMarkers();updMarkerBadge();closeMarkerDlg();
}
function prevMarker(){if(!markers.length)return;var cur=(ctx.currentTime-startTime)*1000000;var p=markers.filter(function(m){return m.timeUs<cur-500000;}).pop()||markers[markers.length-1];if(p)playFrom(p.timeUs/1000000);}
function nextMarker(){if(!markers.length)return;var cur=(ctx.currentTime-startTime)*1000000;var n=markers.find(function(m){return m.timeUs>cur+500000;})||markers[0];if(n)playFrom(n.timeUs/1000000);}

document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('startBtn').addEventListener('click',start);
    document.getElementById('micGain').addEventListener('input',function(e){setMic(e.target.value/100);});
    document.getElementById('playGain').addEventListener('input',function(e){setPlay(e.target.value/100);});
    document.getElementById('masterFader').addEventListener('input',function(e){setMaster(e.target.value/100);});
    document.getElementById('voiceFader').addEventListener('input',function(e){setMic(e.target.value/100);});
    document.getElementById('playFader').addEventListener('input',function(e){setPlay(e.target.value/100);});
    document.getElementById('monGain').addEventListener('input',function(e){setMon(e.target.value/100);});
    document.getElementById('seekBar').addEventListener('input',function(e){if(audioBuf)playFrom((e.target.value/1000)*audioBuf.duration);});
    setTimeout(function(){start().catch(function(){err('Toque para iniciar');});},800);
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
